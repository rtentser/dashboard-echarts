version: "3.8"

services:
  web:
    build: .
    ports:
      - "3000:80"
    restart: unless-stopped
    env_file: .env

  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    env_file: .env
    environment:
      - CHOKIDAR_USEPOLLING=true
